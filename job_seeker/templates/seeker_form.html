{% extends "index.html" %}
{% load static %}
{% load crispy_forms_tags %}
{% block content %}

<header class="site-header">
    <div class="section-overlay"></div>

    <div class="container">
        <div class="row">
            
            <div class="col-lg-12 col-12 text-center">
                <h1 class="text-white">Resume</h1>

                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb justify-content-center">
                        <li class="breadcrumb-item"><a href="/">Home</a></li>

                        <li class="breadcrumb-item active" aria-current="page">Resume</li>
                    </ol>
                </nav>
            </div>

        </div>
    </div>
</header>

<div class="col-lg-8 col-6 mx-auto">
 <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="{{ form.Resume.id_for_label }}">Resume (PDF only):</label>
            {{ form.Resume }}
            {% if form.Resume.errors %}
                <div class="error">{{ form.Resume.errors }}</div>
            {% endif %}
        </div>
        
        <button type="submit" class="btn btn-primary">Upload Resume</button>
    </form>
</div>
{% endblock content %}
